name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build the shared contract first so downstream `tsc -b` never reads a
      # partially-emitted packages/shared/dist/*.d.ts (a `pnpm -r` parallel race
      # that surfaces as TS2306 "is not a module" on slower CI runners).
      - name: Build shared contract
        run: pnpm --filter @ramp/shared build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      # The unit tests prove the KERNEL works. These prove the GATE works.
      #
      # `pnpm demo` spawns `hook/evaluate.mjs` as a real subprocess — exactly how
      # Claude Code invokes it — for every beat in PITCH.md, and asserts the exit
      # code (2 = denied), because the exit code IS the contract with Claude Code.
      # A green kernel with a broken hook is a broken product; CI should notice.
      #
      # This is also what stops PITCH.md from drifting into fiction. If someone
      # changes the policy so the happy path denies, or reintroduces the
      # fail-open that let the $400 over-limit beat through, this job goes red —
      # the pitch is executable, not prose.
      - name: Seed the authoritative ledger
        run: pnpm db:reset

      - name: Drive every PITCH.md demo beat through the real hook
        run: pnpm demo

      # Re-verify the bundles the gate just sealed, with an independent verifier
      # that re-derives each decision from its recorded facts. Also walks the
      # hash chain — deleting a decision used to be completely invisible.
      - name: Independently verify the sealed provenance bundles + the chain
        run: pnpm proof --summary

      # Run the AUDITOR'S verifier exactly as an auditor would: one file, copied
      # out of the repo, with no node_modules and nothing from the workspace.
      #
      # Running it in place would prove nothing — it would silently keep working
      # if it ever grew a dependency on the monorepo, and the whole claim of that
      # file is that it has none. Copying it to an empty directory is the claim,
      # tested. If this step fails, the file we hand auditors is a lie.
      - name: Verify bundles with the standalone auditor's verifier (zero deps)
        run: |
          mkdir -p /tmp/auditor-ci
          cp verify-ramp-proof.mjs /tmp/auditor-ci/
          cp -r .ramp/bundles /tmp/auditor-ci/bundles
          cd /tmp/auditor-ci
          node verify-ramp-proof.mjs bundles

      # Smoke-check the operator view against the demo-populated ledger.
      - name: Operator stats
        run: pnpm stats --json

  # OPTIONAL job: only does real work where souffle + wasm-pack exist. It never gates
  # the build — the TS reference kernel is always present, so the `build` job above is
  # green with no souffle/wasm-pack. continue-on-error keeps a red X here non-blocking.
  wasm-kernel:
    name: wasm kernel (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Probe toolchain (souffle + wasm-pack)
        id: probe
        run: |
          if command -v souffle >/dev/null 2>&1 && command -v wasm-pack >/dev/null 2>&1; then
            echo "have_toolchain=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_toolchain=false" >> "$GITHUB_OUTPUT"
            echo "souffle/wasm-pack not present — skipping wasm build (reference kernel covers CI)."
          fi

      - name: Build wasm kernel
        if: steps.probe.outputs.have_toolchain == 'true'
        run: pnpm --filter @ramp/gate build:wasm

      - name: Cross-check wasm vs reference oracle (parity)
        if: steps.probe.outputs.have_toolchain == 'true'
        run: pnpm --filter @ramp/gate test:parity
