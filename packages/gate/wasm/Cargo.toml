# ============================================================================
# @ramp/gate — wasm crate (OPTIONAL)
# ============================================================================
# A HAND-WRITTEN Rust mirror of the policy kernel (datalog/policy.dl is the spec),
# wrapped in a #[wasm_bindgen] shell and compiled to WebAssembly via wasm-pack.
# Standalone: only wasm-bindgen + serde, no Souffle, no C++, no build.rs. Built by
# scripts/build-wasm.sh (needs wasm-pack + cargo); the TS reference kernel is the
# always-available default, so this never gates the default CI build. Its
# equivalence to the reference kernel is TESTED, not asserted (test/parity.test.ts).
# ----------------------------------------------------------------------------
[package]
name = "ramp-gate-wasm"
version = "0.0.0"
edition = "2021"
description = "Warrant — Souffle policy kernel compiled to WebAssembly."
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "s"
lto = true
